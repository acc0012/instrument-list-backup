name: Fetch Index Option Chains

on:
  push:
    paths:
      - fetch_index_option_chain.py   # runs only if this file changes
      - requirements.txt              # optional: also run if deps change

  schedule:
    - cron: "30 11 * * *"

  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python fetch_index_option_chain.py
        env:
          AUTH_MONGO_URI: ${{ secrets.AUTH_MONGO_URI }}
          AUTH_MONGO_DB: ${{ secrets.AUTH_MONGO_DB }}
          AUTH_MONGO_COLLECTION: ${{ secrets.AUTH_MONGO_COLLECTION }}
