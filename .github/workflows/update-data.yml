name: Update Dhan Scrip Master

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 3 AM UTC
  workflow_dispatch:

  # 🔥 run when workflow file changes
  push:
    paths:
      - ".github/workflows/update-data.yml"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: 📦 Install dependencies
        run: pip install requests

      # 4️⃣ Create data folder
      - name: 📁 Create data folder
        run: mkdir -p data

      # 5️⃣ Download CSV
      - name: ⬇️ Download CSV
        run: |
          curl -L "https://images.dhan.co/api-data/api-scrip-master.csv" \
          -o data/api-scrip-master.csv

      # 6️⃣ Convert CSV → BATCH JSON (NO LARGE FILE)
      - name: 🔄 Convert CSV to batched JSON
        run: |
          python <<EOF
          import csv, json, os

          csv_path = "data/api-scrip-master.csv"
          MAX_FILE_SIZE = 50 * 1024 * 1024  # 50MB

          file_index = 1
          current_size = 0
          current_data = []

          def save_batch(data, index):
              path = f"data/api-scrip-master-{index}.json"
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(data, f)
              print(f"Saved {path} with {len(data)} rows")

          with open(csv_path, newline='', encoding='utf-8') as f:
              reader = csv.DictReader(f)

              for row in reader:
                  row_json = json.dumps(row)
                  row_size = len(row_json.encode("utf-8"))

                  if current_size + row_size > MAX_FILE_SIZE and current_data:
                      save_batch(current_data, file_index)
                      file_index += 1
                      current_data = []
                      current_size = 0

                  current_data.append(row)
                  current_size += row_size

          if current_data:
              save_batch(current_data, file_index)

          print("✅ Batched JSON created")
          EOF

      # 7️⃣ Remove CSV (optional but recommended)
      - name: 🧹 Remove CSV file
        run: rm -f data/api-scrip-master.csv

      # 8️⃣ Ensure large JSON is NOT present
      - name: 🚫 Remove large JSON if exists
        run: rm -f data/api-scrip-master.json

      # 9️⃣ Commit only batch files
      - name: 🔄 Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/api-scrip-master-*.json

          git diff --cached --quiet || git commit -m "Auto update batched data"

          git push