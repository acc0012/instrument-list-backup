name: Update Dhan Scrip Master

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-data.yml"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🧹 Reset data folder
        run: |
          rm -rf data
          mkdir -p data

      # 5️⃣ Download CSV (kept as-is, not removed)
      - name: ⬇️ Download CSV
        run: |
          curl -L "https://images.dhan.co/api-data/api-scrip-master.csv" \
          -o data/api-scrip-master.csv

      # 🔥 ONLY CHANGE: run python file instead of inline script
      - name: 🔄 Run CSV to JSON script
        run: python csv_to_json.py

      # 7️⃣ Remove CSV (avoid large file push)
      - name: 🧹 Remove CSV file
        run: rm -f data/api-scrip-master.csv

      # 8️⃣ Ensure large JSON is NOT present
      - name: 🚫 Remove large JSON if exists
        run: rm -f data/api-scrip-master.json

      # 🔥 NEW: Force change every run (SAFE)
      - name: 🕒 Add timestamp file
        run: echo "Updated at $(date)" > data/last_updated.txt

      # 9️⃣ Commit & Push only batch files
      - name: 🔄 Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          
          git diff --cached --quiet || git commit -m "Auto update filtered batched data"
          git push
