name: Update Dhan Scrip Master

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 3 AM UTC
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-data.yml"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: 📦 Install dependencies
        run: pip install requests

      # 4️⃣ Create data folder
      - name: 📁 Create data folder
        run: mkdir -p data

      # 🔥 NEW STEP HERE
      - name: 🧹 Remove old batch files
        run: rm -f data/api-scrip-master-*.json

      # 5️⃣ Download CSV
      - name: ⬇️ Download CSV
        run: |
          curl -L "https://images.dhan.co/api-data/api-scrip-master.csv" \
          -o data/api-scrip-master.csv

      # 6️⃣ Convert CSV → FILTERED + BATCHED JSON
      - name: 🔄 Convert CSV to filtered batched JSON
        run: |
          python <<EOF
          import csv, json

          csv_path = "data/api-scrip-master.csv"
          MAX_FILE_SIZE = 50 * 1024 * 1024  # 50MB

          file_index = 1
          current_size = 0
          current_data = []

          def save_batch(data, index):
              path = f"data/api-scrip-master-{index}.json"
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(data, f)
              print(f"Saved {path} with {len(data)} rows")

          with open(csv_path, newline='', encoding='utf-8') as f:
              reader = csv.DictReader(f)

              for row in reader:
                  segment = row.get("SEM_SEGMENT", "")
                  instrument = row.get("SEM_INSTRUMENT_NAME", "")

                  # 🔥 FILTER: only D (derivatives) + I (index)
                  if segment not in ["D", "I"]:
                      continue

                  # 🔥 Only options inside D (skip futures)
                  if segment == "D" and instrument not in ["OPTIDX", "OPTSTK"]:
                      continue

                  # 🔥 Reduce size (important)
                  filtered_row = {
                      "id": row.get("SEM_SMST_SECURITY_ID"),
                      "symbol": row.get("SEM_TRADING_SYMBOL"),
                      "segment": segment,
                      "instrument": instrument,
                      "expiry": row.get("SEM_EXPIRY_DATE"),
                      "strike": row.get("SEM_STRIKE_PRICE"),
                      "optionType": row.get("SEM_OPTION_TYPE"),
                  }

                  row_json = json.dumps(filtered_row)
                  row_size = len(row_json.encode("utf-8"))

                  if current_size + row_size > MAX_FILE_SIZE and current_data:
                      save_batch(current_data, file_index)
                      file_index += 1
                      current_data = []
                      current_size = 0

                  current_data.append(filtered_row)
                  current_size += row_size

          if current_data:
              save_batch(current_data, file_index)

          print("✅ Filtered batched JSON created")
          EOF

      # 7️⃣ Remove CSV (avoid large file push)
      - name: 🧹 Remove CSV file
        run: rm -f data/api-scrip-master.csv

      # 8️⃣ Ensure large JSON is NOT present
      - name: 🚫 Remove large JSON if exists
        run: rm -f data/api-scrip-master.json

      # 9️⃣ Commit & Push only batch files
      - name: 🔄 Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/api-scrip-master-*.json

          git diff --cached --quiet || git commit -m "Auto update filtered batched data"

          git push